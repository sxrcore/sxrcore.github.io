<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Анимированная топографическая карта</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    background: #111;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="topo"></canvas>
<script>
// Настройка canvas
const canvas = document.getElementById('topo');
const ctx = canvas.getContext('2d');
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// Простая функция шума для плавных линий (можно заменить на Perlin/simplex)
function noise(x, y, t) {
    return (Math.sin(x*0.02 + t) + Math.cos(y*0.02 + t))/2 + 0.5;
}

// Генерация топографического изображения
function drawTopo(t) {
    const imageData = ctx.createImageData(width, height);
    for(let y=0; y<height; y++){
        for(let x=0; x<width; x++){
            const value = Math.floor(noise(x, y, t) * 255);
            const index = (x + y * width) * 4;
            imageData.data[index] = value;
            imageData.data[index+1] = value;
            imageData.data[index+2] = value;
            imageData.data[index+3] = 255;
        }
    }
    ctx.putImageData(imageData, 0, 0);
}

// Для размытия вокруг мыши
let mouse = { x: -1000, y: -1000 };
canvas.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});
canvas.addEventListener('mouseleave', e => {
    mouse.x = -1000;
    mouse.y = -1000;
});

// Анимация
let t = 0;
function animate() {
    t += 0.02;

    // Сначала рисуем базовый фон
    drawTopo(t);

    // Размытие вокруг мыши
    const radius = 120;
    const blur = 20;
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.filter = `blur(${blur}px)`;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, radius, 0, Math.PI*2);
    ctx.clip();
    drawTopo(t);
    ctx.restore();

    requestAnimationFrame(animate);
}
animate();

// Адаптация под ресайз
window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
});
</script>
</body>
</html>
